blueprint:
  name: eVisitor – check in on arrival
  description: >-
    When the mapped HA person becomes "home", check them into eVisitor.
    Three modes select how much user interaction the check-in needs:

    * **silent** — register the check-in immediately, no notification.
    * **notify** — register the check-in immediately AND send a
      passive notification telling you it happened.
    * **confirm** — send an actionable notification first; register
      only if the user taps "Check in" (rather than "Skip"). On
      timeout the automation does nothing.

    For `notify` and `confirm`, pick the notification platform via the
    `platform` input:

    * HA Companion app — push notification via a `notify.mobile_app_*`
      service; buttons render natively on the lockscreen.
    * Telegram — message via `telegram_bot.send_message` with an
      inline keyboard; buttons render inside the Telegram chat.

    Replaces the old `auto_check_in.yaml` and
    `confirm_check_in_actionable.yaml` blueprints, which together
    covered the same matrix of behaviours.
  domain: automation
  source_url: https://raw.githubusercontent.com/skateman/ha-evisitor/main/custom_components/evisitor/blueprints/automation/evisitor/auto_check_in.yaml
  input:
    person:
      name: Person(s)
      description: >-
        One or more HA person entities. The check-in fires once per
        person, when *that* person becomes home. Each chosen person
        must be mapped in the eVisitor integration's options.
      selector:
        entity:
          domain: person
          multiple: true

    mode:
      name: Action mode
      description: >-
        How to handle the check-in. "silent" requires no user action;
        "notify" sends a passive informational notification after
        checking in; "confirm" requires the user to tap a button
        before the check-in is registered.
      default: confirm
      selector:
        select:
          options:
            - label: Silent — register immediately, no notification
              value: silent
            - label: Notify — register + send a passive notification
              value: notify
            - label: Confirm — actionable notification, register on tap
              value: confirm

    presence_debounce_minutes:
      name: Presence debounce (minutes)
      description: >-
        How long the person must continuously stay "home" before the
        automation fires. Guards against brief presence flapping.
      default: 1
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: min
          mode: box

    stay_days:
      name: Stay length (days)
      description: >-
        How many days from today the prijava should be valid for.
        Leave at 0 to use the integration's default (48 h).
      default: 0
      selector:
        number:
          min: 0
          max: 90
          step: 1
          unit_of_measurement: days
          mode: box

    check_out_time:
      name: Default check-out time (HH:MM)
      description: >-
        Time-of-day component of the foreseen check-out. Only used
        when "Stay length (days)" is set to 1 or more.
      default: "10:00"
      selector:
        text:

    platform:
      name: Notification platform
      description: >-
        Used for `notify` and `confirm` modes. Ignored for `silent`.
      default: companion
      selector:
        select:
          options:
            - label: HA Companion app
              value: companion
            - label: Telegram bot
              value: telegram

    notify_service:
      name: Companion notify service
      description: >-
        Used when platform = "companion". Example:
        `notify.mobile_app_my_phone`. Ignored for Telegram or silent.
      default: ""
      selector:
        text:

    telegram_chat_id:
      name: Telegram chat ID
      description: >-
        Used when platform = "telegram". Numeric chat ID (positive
        for private chats, negative for group chats). Ask @userinfobot
        on Telegram for your own ID. Ignored for Companion or silent.
      default: ""
      selector:
        text:

    notification_title:
      name: Notification title
      description: >-
        Title shown above the message. On Companion this is the
        notification title; on Telegram it is rendered as bold text
        at the top of the message (markdown).
      default: "eVisitor"
      selector:
        text:

    notification_message:
      name: Notification message
      description: >-
        Text shown in the notification. The placeholder ``{name}`` is
        replaced with the person's friendly name. Default phrasing
        works for both `notify` and `confirm`; override if you want
        e.g. past-tense text for `notify`-mode (like
        "{name} arrived; checked into eVisitor.").
      default: "Check {name} into eVisitor?"
      selector:
        text:

    check_in_action_label:
      name: 'Button label: Check in (confirm mode)'
      default: "Check in"
      selector:
        text:

    skip_action_label:
      name: 'Button label: Skip (confirm mode)'
      default: "Skip"
      selector:
        text:

    notification_timeout_minutes:
      name: Confirm timeout (minutes)
      description: >-
        How long to wait for the user's tap before giving up. Only
        used in `confirm` mode.
      default: 60
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
          mode: box

variables:
  mode: !input mode
  platform: !input platform
  telegram_chat_id: !input telegram_chat_id
  stay_days: !input stay_days
  check_out_time: !input check_out_time
  notification_title: !input notification_title
  notification_message: !input notification_message
  check_in_action_label: !input check_in_action_label
  skip_action_label: !input skip_action_label
  notification_timeout_minutes: !input notification_timeout_minutes
  # Resolved here so the companion-only `service:` field below renders
  # via a template (runtime) instead of being substituted literally at
  # blueprint-instantiate time. An empty default for telegram users
  # would otherwise trip Home Assistant's static service-name
  # validator before the dead companion branch is ever reached.
  notify_service_name: !input notify_service
  # Slash-prefixed so the same string works as a Telegram callback_data
  # (which conventionally looks like a /command) and as a Companion
  # action ID (which accepts any string).
  action_check_in: "/evisitor_check_in_{{ trigger.entity_id }}"
  action_skip: "/evisitor_skip_{{ trigger.entity_id }}"
  person_name: "{{ state_attr(trigger.entity_id, 'friendly_name') or trigger.entity_id }}"
  rendered_message: "{{ notification_message.replace('{name}', person_name) }}"

trigger:
  - platform: state
    entity_id: !input person
    to: "home"
    for:
      minutes: !input presence_debounce_minutes

action:
  # ============================================================
  # 1. Confirm mode: send actionable, wait, branch, halt on skip
  # ============================================================
  - choose:
      - conditions:
          - "{{ mode == 'confirm' }}"
        sequence:
          # 1a. Send the actionable notification on the chosen platform.
          - choose:
              - conditions:
                  - "{{ platform == 'companion' }}"
                sequence:
                  - service: "{{ notify_service_name }}"
                    data:
                      title: "{{ notification_title }}"
                      message: "{{ rendered_message }}"
                      data:
                        actions:
                          - action: "{{ action_check_in }}"
                            title: "{{ check_in_action_label }}"
                          - action: "{{ action_skip }}"
                            title: "{{ skip_action_label }}"

              - conditions:
                  - "{{ platform == 'telegram' }}"
                sequence:
                  - service: telegram_bot.send_message
                    data:
                      target: "{{ telegram_chat_id | int(0) }}"
                      # Telegram has no separate title field; render
                      # the title as bold text at the top of the body.
                      message: "*{{ notification_title }}*\n{{ rendered_message }}"
                      parse_mode: markdown
                      inline_keyboard:
                        - "{{ check_in_action_label }}:{{ action_check_in }}, {{ skip_action_label }}:{{ action_skip }}"

          # 1b. Wait for the user's response.
          # Listens for both event shapes; only the one matching the
          # chosen platform will ever actually fire.
          - wait_for_trigger:
              - platform: event
                event_type: mobile_app_notification_action
                event_data:
                  action: "{{ action_check_in }}"
              - platform: event
                event_type: mobile_app_notification_action
                event_data:
                  action: "{{ action_skip }}"
              - platform: event
                event_type: telegram_callback
                event_data:
                  data: "{{ action_check_in }}"
              - platform: event
                event_type: telegram_callback
                event_data:
                  data: "{{ action_skip }}"
            timeout:
              minutes: "{{ notification_timeout_minutes | int }}"
            continue_on_timeout: false

          # 1c. Telegram only: ack the callback so the user gets a
          # toast and the spinner stops on the button.
          - choose:
              - conditions:
                  - "{{ wait.trigger.event.event_type == 'telegram_callback' }}"
                sequence:
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ wait.trigger.event.data.id }}"
                      message: >-
                        {%- if wait.trigger.event.data.data == action_check_in -%}
                        {{ check_in_action_label }} ✓
                        {%- else -%}
                        {{ skip_action_label }} ✓
                        {%- endif -%}

          # 1d. Halt the automation if the user didn't pick "Check in".
          # Companion fires with `event.data.action`; Telegram with
          # `event.data.data`. Check both, using `| default('')` so
          # a missing field doesn't error.
          - choose:
              - conditions:
                  - >-
                    {{ (wait.trigger.event.data.action | default('')) != action_check_in
                       and (wait.trigger.event.data.data | default('')) != action_check_in }}
                sequence:
                  - stop: "User chose to skip; no check-in registered."

  # ============================================================
  # 2. Check in (reached unless mode=confirm and user skipped).
  # ============================================================
  - choose:
      - conditions:
          - "{{ (stay_days | int(0)) > 0 }}"
        sequence:
          - service: evisitor.check_in_person
            data:
              person: "{{ trigger.entity_id }}"
              # Actual moment the person became "home", not the moment
              # the automation got around to firing. The eVisitor server
              # accepts StayFrom up to ~14 days back -- well outside any
              # realistic debounce / confirm-timeout window.
              stay_from: "{{ trigger.to_state.last_changed.isoformat() }}"
              foreseen_stay_until: >-
                {%- set parts = (check_out_time | default('10:00')).split(':') -%}
                {%- set hh = parts[0] | int(10) -%}
                {%- set mm = parts[1] | int(0) -%}
                {{ ((now()).replace(hour=hh, minute=mm, second=0, microsecond=0) + timedelta(days=stay_days | int)).isoformat() }}
    default:
      - service: evisitor.check_in_person
        data:
          person: "{{ trigger.entity_id }}"
          stay_from: "{{ trigger.to_state.last_changed.isoformat() }}"

  # ============================================================
  # 3. Notify mode: passive informational notification after check-in.
  # ============================================================
  - choose:
      - conditions:
          - "{{ mode == 'notify' }}"
        sequence:
          - choose:
              - conditions:
                  - "{{ platform == 'companion' }}"
                sequence:
                  - service: "{{ notify_service_name }}"
                    data:
                      title: "{{ notification_title }}"
                      message: "{{ rendered_message }}"
                      # No `data.actions` -- passive notification only.

              - conditions:
                  - "{{ platform == 'telegram' }}"
                sequence:
                  - service: telegram_bot.send_message
                    data:
                      target: "{{ telegram_chat_id | int(0) }}"
                      message: "*{{ notification_title }}*\n{{ rendered_message }}"
                      parse_mode: markdown
                      # No `inline_keyboard` -- passive notification only.

mode: parallel
max: 10
