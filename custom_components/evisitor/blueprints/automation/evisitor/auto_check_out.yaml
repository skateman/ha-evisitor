blueprint:
  name: eVisitor – check out after grace period
  description: >-
    When the mapped HA person has been "not home" for the configured
    grace period, check them out of eVisitor. Three modes select how
    much user interaction the check-out needs:

    * **silent** — register the check-out immediately, no notification.
    * **notify** — register the check-out immediately AND send a
      passive notification telling you it happened.
    * **confirm** — send an actionable notification first; register
      only if the user taps "Check out" (rather than "Keep checked
      in"). On timeout the automation does nothing.

    For `notify` and `confirm`, pick the notification platform via the
    `platform` input:

    * HA Companion app — push notification via a `notify.mobile_app_*`
      service; buttons render natively on the lockscreen.
    * Telegram — message via `telegram_bot.send_message` with an
      inline keyboard; buttons render inside the Telegram chat.

    Optional time-of-day window guards against nighttime presence
    blips triggering a real check-out (in any mode).
  domain: automation
  source_url: https://raw.githubusercontent.com/skateman/ha-evisitor/main/custom_components/evisitor/blueprints/automation/evisitor/auto_check_out.yaml
  input:
    person:
      name: Person(s)
      description: >-
        One or more HA person entities. Check-out fires per person
        when *that* person has been "not home" for the grace period.
      selector:
        entity:
          domain: person
          multiple: true

    mode:
      name: Action mode
      description: >-
        How to handle the check-out. "silent" requires no user action;
        "notify" sends a passive informational notification after
        checking out; "confirm" requires the user to tap a button
        before the check-out is registered.
      default: confirm
      selector:
        select:
          options:
            - label: Silent — register immediately, no notification
              value: silent
            - label: Notify — register + send a passive notification
              value: notify
            - label: Confirm — actionable notification, register on tap
              value: confirm

    grace_minutes:
      name: Away grace period (minutes)
      description: >-
        Person must remain away for this long before the automation
        fires. Guards against brief presence flapping.
      default: 60
      selector:
        number:
          min: 5
          max: 1440
          step: 1
          unit_of_measurement: min
          mode: box

    only_during_window:
      name: Only fire within a time-of-day window
      description: >-
        When enabled, only run the automation if the trigger time
        falls between "Window start" and "Window end". Useful to
        avoid nighttime presence blips triggering a real check-out.
      default: false
      selector:
        boolean:

    window_start:
      name: Window start (HH:MM)
      description: Earliest local time the automation may fire.
      default: "08:00"
      selector:
        text:

    window_end:
      name: Window end (HH:MM)
      description: Latest local time the automation may fire.
      default: "23:00"
      selector:
        text:

    platform:
      name: Notification platform
      description: >-
        Used for `notify` and `confirm` modes. Ignored for `silent`.
      default: companion
      selector:
        select:
          options:
            - label: HA Companion app
              value: companion
            - label: Telegram bot
              value: telegram

    notify_service:
      name: Companion notify service
      description: >-
        Used when platform = "companion". Example:
        `notify.mobile_app_my_phone`. Ignored for Telegram or silent.
      default: ""
      selector:
        text:

    telegram_chat_id:
      name: Telegram chat ID
      description: >-
        Used when platform = "telegram". Numeric chat ID (positive
        for private chats, negative for group chats). Ask @userinfobot
        on Telegram for your own ID. Ignored for Companion or silent.
      default: ""
      selector:
        text:

    notification_title:
      name: Notification title
      description: >-
        Title shown above the message. On Companion this is the
        notification title; on Telegram it is rendered as bold text
        at the top of the message (markdown).
      default: "eVisitor"
      selector:
        text:

    notification_message:
      name: Notification message
      description: >-
        Text shown in the notification. The placeholder ``{name}`` is
        replaced with the person's friendly name. Default phrasing
        works for both `notify` and `confirm`; override if you want
        e.g. past-tense text for `notify`-mode (like
        "{name} left; checked out of eVisitor.").
      default: "Check {name} out of eVisitor?"
      selector:
        text:

    check_out_action_label:
      name: 'Button label: Check out (confirm mode)'
      default: "Check out"
      selector:
        text:

    keep_in_action_label:
      name: 'Button label: Keep checked in (confirm mode)'
      default: "Keep them"
      selector:
        text:

    notification_timeout_minutes:
      name: Confirm timeout (minutes)
      description: >-
        How long to wait for the user's tap before giving up. Only
        used in `confirm` mode.
      default: 60
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
          mode: box

variables:
  mode: !input mode
  platform: !input platform
  telegram_chat_id: !input telegram_chat_id
  only_during_window: !input only_during_window
  window_start: !input window_start
  window_end: !input window_end
  notification_title: !input notification_title
  notification_message: !input notification_message
  check_out_action_label: !input check_out_action_label
  keep_in_action_label: !input keep_in_action_label
  notification_timeout_minutes: !input notification_timeout_minutes
  # Resolved here so the companion-only `service:` field below renders
  # via a template (runtime) instead of being substituted literally at
  # blueprint-instantiate time. An empty default for telegram users
  # would otherwise trip Home Assistant's static service-name
  # validator before the dead companion branch is ever reached.
  notify_service_name: !input notify_service
  # Slash-prefixed so the same string works as a Telegram callback_data
  # (which conventionally looks like a /command) and as a Companion
  # action ID (which accepts any string).
  action_check_out: "/evisitor_check_out_{{ trigger.entity_id }}"
  action_keep_in: "/evisitor_keep_in_{{ trigger.entity_id }}"
  person_name: "{{ state_attr(trigger.entity_id, 'friendly_name') or trigger.entity_id }}"
  rendered_message: "{{ notification_message.replace('{name}', person_name) }}"

trigger:
  - platform: state
    entity_id: !input person
    from: "home"
    for:
      minutes: !input grace_minutes

condition:
  - condition: template
    value_template: >-
      {%- if not only_during_window -%}
      true
      {%- else -%}
      {%- set s = window_start.split(':') | map('int') | list -%}
      {%- set e = window_end.split(':') | map('int') | list -%}
      {%- set start = s[0] * 60 + s[1] -%}
      {%- set end = e[0] * 60 + e[1] -%}
      {%- set cur = now().hour * 60 + now().minute -%}
      {{ start <= cur <= end }}
      {%- endif -%}

action:
  # ============================================================
  # 1. Confirm mode: send actionable, wait, branch, halt on keep-in
  # ============================================================
  - choose:
      - conditions:
          - "{{ mode == 'confirm' }}"
        sequence:
          # 1a. Send the actionable notification on the chosen platform.
          - choose:
              - conditions:
                  - "{{ platform == 'companion' }}"
                sequence:
                  - service: "{{ notify_service_name }}"
                    data:
                      title: "{{ notification_title }}"
                      message: "{{ rendered_message }}"
                      data:
                        actions:
                          - action: "{{ action_check_out }}"
                            title: "{{ check_out_action_label }}"
                          - action: "{{ action_keep_in }}"
                            title: "{{ keep_in_action_label }}"

              - conditions:
                  - "{{ platform == 'telegram' }}"
                sequence:
                  - service: telegram_bot.send_message
                    data:
                      target: "{{ telegram_chat_id | int(0) }}"
                      # Telegram has no separate title field; render
                      # the title as bold text at the top of the body.
                      message: "*{{ notification_title }}*\n{{ rendered_message }}"
                      parse_mode: markdown
                      inline_keyboard:
                        - "{{ check_out_action_label }}:{{ action_check_out }}, {{ keep_in_action_label }}:{{ action_keep_in }}"

          # 1b. Wait for the user's response.
          # Listens for both event shapes; only the one matching the
          # chosen platform will ever actually fire.
          - wait_for_trigger:
              - platform: event
                event_type: mobile_app_notification_action
                event_data:
                  action: "{{ action_check_out }}"
              - platform: event
                event_type: mobile_app_notification_action
                event_data:
                  action: "{{ action_keep_in }}"
              - platform: event
                event_type: telegram_callback
                event_data:
                  data: "{{ action_check_out }}"
              - platform: event
                event_type: telegram_callback
                event_data:
                  data: "{{ action_keep_in }}"
            timeout:
              minutes: "{{ notification_timeout_minutes | int }}"
            continue_on_timeout: false

          # 1c. Telegram only: ack the callback so the user gets a
          # toast and the spinner stops on the button.
          - choose:
              - conditions:
                  - "{{ wait.trigger.event.event_type == 'telegram_callback' }}"
                sequence:
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ wait.trigger.event.data.id }}"
                      message: >-
                        {%- if wait.trigger.event.data.data == action_check_out -%}
                        {{ check_out_action_label }} ✓
                        {%- else -%}
                        {{ keep_in_action_label }} ✓
                        {%- endif -%}

          # 1d. Halt the automation if the user didn't pick "Check out".
          # Companion fires with `event.data.action`; Telegram with
          # `event.data.data`. Check both, using `| default('')` so
          # a missing field doesn't error.
          - choose:
              - conditions:
                  - >-
                    {{ (wait.trigger.event.data.action | default('')) != action_check_out
                       and (wait.trigger.event.data.data | default('')) != action_check_out }}
                sequence:
                  - stop: "User chose to keep them checked in; no check-out registered."

  # ============================================================
  # 2. Check out (reached unless mode=confirm and user kept-in).
  # ============================================================
  - service: evisitor.check_out_person
    data:
      person: "{{ trigger.entity_id }}"
      # Actual moment the person left home, not the moment the
      # grace period finished or the user tapped a button.
      check_out_at: "{{ trigger.from_state.last_changed.isoformat() }}"

  # ============================================================
  # 3. Notify mode: passive informational notification after check-out.
  # ============================================================
  - choose:
      - conditions:
          - "{{ mode == 'notify' }}"
        sequence:
          - choose:
              - conditions:
                  - "{{ platform == 'companion' }}"
                sequence:
                  - service: "{{ notify_service_name }}"
                    data:
                      title: "{{ notification_title }}"
                      message: "{{ rendered_message }}"
                      # No `data.actions` -- passive notification only.

              - conditions:
                  - "{{ platform == 'telegram' }}"
                sequence:
                  - service: telegram_bot.send_message
                    data:
                      target: "{{ telegram_chat_id | int(0) }}"
                      message: "*{{ notification_title }}*\n{{ rendered_message }}"
                      parse_mode: markdown
                      # No `inline_keyboard` -- passive notification only.

mode: parallel
max: 10
