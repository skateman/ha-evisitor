name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Cancel in-flight runs on the same ref (e.g. re-tag).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify tag matches package version
        # Compares the v-prefixed git tag (e.g. v0.1.0) against
        # the [project] version in pyproject.toml. Hard-fails if they
        # don't match so we never publish a mis-tagged release.
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(python -c 'import tomllib,sys; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "tag=$tag pkg=$pkg"
          [ "$tag" = "$pkg" ] || { echo "::error::Tag $tag does not match pyproject version $pkg"; exit 1; }

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyevisitor
    permissions:
      id-token: write    # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        # No `with: password:` -- Trusted Publishing uses OIDC.
