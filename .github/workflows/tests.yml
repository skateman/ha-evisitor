name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel previous in-progress runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Library + HA-runtime unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pytest-homeassistant-custom-component pulls in Home Assistant core,
      # which currently requires Python >=3.14.2. Bump in lockstep with HA.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,ha-test]"

      - name: Run unit tests (excludes live e2e)
        run: pytest -q --ignore=tests/e2e

  hassfest:
    name: Hassfest (HA integration validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master
        with:
          # Skip the `brands` check: it requires a PR against
          # home-assistant/brands for inclusion of the integration's
          # logo, which only applies to integrations that ship inside
          # HA core. Custom integrations don't need it.
          ignore: brands
